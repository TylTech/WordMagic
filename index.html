<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#7c3aed">
  <link id="manifest-link" rel="manifest">
  <link id="apple-icon" rel="apple-touch-icon">
  <title>Word Magic ✨</title>
  <style>
    :root {
      --bg1:#0b1020; --bg2:#1a0835;
      --purple:#7c3aed; --pink:#ec4899; --gold:#fbbf24; --green:#34d399;
      --text:#f8fafc; --muted:rgba(248,250,252,.75);
      --card:rgba(255,255,255,.10); --card2:rgba(255,255,255,.13);
      --border:rgba(255,255,255,.15); --shadow:0 20px 60px rgba(0,0,0,.4);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;}
    body{
      font-family:ui-rounded,-apple-system,"SF Pro Display",system-ui,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 15% 10%,rgba(236,72,153,.20),transparent 60%),
        radial-gradient(900px 600px at 85% 25%,rgba(124,58,237,.26),transparent 60%),
        radial-gradient(800px 500px at 50% 90%,rgba(251,191,36,.18),transparent 60%),
        linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 100%);
      touch-action:manipulation;user-select:none;
    }

    /* Background sparkles */
    .bg-sparkle{
      position:fixed;pointer-events:none;z-index:0;border-radius:50%;
      background:white;opacity:0;animation:sparkle-float linear infinite;
      filter:drop-shadow(0 0 5px rgba(255,255,255,.7));
    }
    @keyframes sparkle-float{
      0%{opacity:0;transform:translateY(105vh) translateX(0) scale(1);}
      10%{opacity:.45;}90%{opacity:.35;}
      100%{opacity:0;transform:translateY(-10vh) translateX(60px) scale(.5);}
    }

    /* Confetti */
    #confetti{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
    #confetti i{
      position:absolute;display:block;border-radius:3px;
      animation:confetti-fall 1.6s ease-in forwards;
    }
    @keyframes confetti-fall{
      0%{transform:translateY(-5vh) rotate(0deg);opacity:1;}
      100%{transform:translateY(110vh) rotate(540deg);opacity:.1;}
    }

    /* Star shower */
    #starshower{position:fixed;inset:0;pointer-events:none;z-index:190;overflow:hidden;}
    #starshower span{
      position:absolute;font-size:22px;top:-40px;
      animation:star-fall 1.4s ease-in forwards;
    }
    @keyframes star-fall{
      0%{transform:translateY(0) rotate(0deg);opacity:1;}
      100%{transform:translateY(110vh) rotate(360deg);opacity:0;}
    }

    /* Firework rings */
    .fw-ring{
      position:fixed;pointer-events:none;z-index:195;border-radius:50%;
      border:4px solid transparent;animation:fw-expand .8s ease-out forwards;
      transform:translate(-50%,-50%);
    }
    @keyframes fw-expand{
      0%{width:0;height:0;opacity:1;}
      100%{width:200px;height:200px;opacity:0;}
    }

    /* Layout */
    .app{
      position:relative;z-index:1;height:100%;padding:8px;
      display:flex;flex-direction:column;gap:7px;
      max-width:1100px;margin:0 auto;
    }

    /* Header */
    header{
      flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:8px;
      padding:8px 14px;flex-wrap:wrap;
      background:linear-gradient(90deg,rgba(124,58,237,.25),rgba(236,72,153,.18),rgba(251,191,36,.12));
      border:1px solid var(--border);border-radius:18px;
    }
    .title-area{display:flex;align-items:center;gap:8px;}
    .badge{font-size:24px;}
    h1{font-size:clamp(15px,2.5vw,22px);font-weight:900;letter-spacing:.2px;}
    .sub{font-size:10px;color:var(--muted);margin-top:1px;}
    .header-right{display:flex;gap:7px;align-items:center;flex-wrap:wrap;flex-shrink:0;}

    /* Level toggle */
    .level-toggle{display:flex;gap:4px;background:rgba(0,0,0,.2);border-radius:999px;padding:3px;}
    .lvl-btn{
      padding:5px 11px;border-radius:999px;border:none;font-size:12px;font-weight:900;
      cursor:pointer;transition:all .18s;background:transparent;color:var(--muted);
    }
    .lvl-btn.active{
      background:linear-gradient(135deg,rgba(124,58,237,.7),rgba(236,72,153,.6));
      color:var(--text);box-shadow:0 4px 12px rgba(124,58,237,.35);
    }

    /* Streak pill */
    .streak-pill{
      padding:5px 12px;border-radius:999px;
      background:rgba(0,0,0,.2);border:1px solid var(--border);
      font-size:13px;font-weight:900;white-space:nowrap;
      transition:transform .2s,background .2s;
    }
    .streak-pill.bump{animation:streak-bump .35s ease-out;}
    @keyframes streak-bump{0%{transform:scale(1);}50%{transform:scale(1.25);}100%{transform:scale(1);}}
    .streak-pill .streak-num{color:var(--gold);}
    .streak-fire{display:inline-block;transition:transform .2s;}

    /* Wrong pill */
    .wrong-pill{
      padding:5px 12px;border-radius:999px;
      background:rgba(0,0,0,.2);border:1px solid var(--border);
      font-size:13px;font-weight:900;white-space:nowrap;
    }
    .wrong-pill .count{color:var(--pink);}

    button{
      padding:8px 13px;border-radius:12px;border:1px solid var(--border);
      background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.06));
      color:var(--text);font-size:13px;font-weight:800;
      cursor:pointer;transition:transform .08s,filter .08s;touch-action:manipulation;
    }
    button:active{transform:scale(.95);filter:brightness(1.15);}
    button.primary{
      background:linear-gradient(135deg,rgba(124,58,237,.6),rgba(236,72,153,.5));
      border-color:rgba(255,255,255,.25);
    }

    /* Game area */
    .game-area{flex:1 1 0;min-height:0;display:flex;flex-direction:column;gap:7px;}
    @media (min-width:680px) and (orientation:landscape){.game-area{flex-direction:row;}}

    /* Picture panel */
    .picture-panel{flex:1 1 0;min-height:0;min-width:0;display:flex;align-items:center;justify-content:center;}
    .picture-wrap{
      width:100%;height:100%;
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,rgba(255,255,255,.07),rgba(255,255,255,.03));
      border:1px solid var(--border);border-radius:22px;position:relative;overflow:hidden;
    }
    .picture-wrap svg{width:min(100%,320px);height:min(100%,320px);display:block;}

    .picture-hint{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      text-align:center;pointer-events:none;transition:opacity .4s;
    }
    .picture-hint .hint-emoji{font-size:48px;opacity:.22;display:block;margin-bottom:5px;}
    .picture-hint .hint-text{font-size:11px;color:var(--muted);opacity:.45;}
    .picture-hint.hidden{opacity:0;}

    .svg-part{transition:opacity .55s ease;opacity:0;}
    .svg-part.show{opacity:1;}

    /* Controls panel */
    .controls-panel{flex-shrink:0;display:flex;flex-direction:column;gap:7px;}
    @media (min-width:680px) and (orientation:landscape){.controls-panel{flex:0 0 370px;}}

    /* Word display */
    .word-area{
      background:var(--card);border:1px solid var(--border);
      border-radius:18px;padding:12px 14px;
      display:flex;flex-direction:column;align-items:center;gap:7px;
    }
    .word-display{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
    .letter-slot{
      width:38px;height:44px;border-bottom:3px solid rgba(255,255,255,.35);
      display:flex;align-items:center;justify-content:center;position:relative;
    }
    .letter-slot .ltr{
      font-size:24px;font-weight:900;color:var(--gold);
      opacity:0;transform:scale(0) rotate(-15deg);
      transition:opacity .25s,transform .35s cubic-bezier(.34,1.56,.64,1);
      display:inline-block;
    }
    .letter-slot .ltr.show{opacity:1;transform:scale(1) rotate(0deg);}

    .wrong-row{
      display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:center;min-height:20px;
    }
    .wrong-label{font-size:10px;color:var(--muted);}
    .wrong-ltr{font-size:13px;font-weight:900;color:rgba(248,72,153,.75);text-decoration:line-through;}

    /* Keyboard */
    .keyboard{
      background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));
      border:1px solid var(--border);border-radius:18px;padding:9px 7px;flex-shrink:0;
    }
    .key-row{display:flex;gap:4px;justify-content:center;margin-bottom:4px;}
    .key-row:last-child{margin-bottom:0;}
    .key{
      width:50px;height:47px;border-radius:11px;
      border:1px solid rgba(255,255,255,.22);
      background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.08));
      color:var(--text);font-size:16px;font-weight:900;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:transform .08s,opacity .2s,background .15s;
      touch-action:manipulation;flex-shrink:0;
    }
    .key:active:not(.used-correct):not(.used-wrong){transform:scale(.88);}
    .key.used-correct{
      background:linear-gradient(135deg,rgba(52,211,153,.35),rgba(52,211,153,.2));
      border-color:rgba(52,211,153,.45);opacity:.35;cursor:default;
    }
    .key.used-wrong{
      background:rgba(0,0,0,.12);border-color:rgba(255,255,255,.06);opacity:.2;cursor:default;
    }
    @media (max-width:400px){.key{width:42px;height:43px;font-size:14px;}.key-row{gap:3px;}}
    @media (max-width:360px){.key{width:36px;height:39px;font-size:12px;border-radius:8px;}.key-row{gap:2px;}}

    /* Sparkle burst */
    .spark{
      position:fixed;pointer-events:none;z-index:150;border-radius:50%;
      animation:spark-fly .7s ease-out forwards;
    }
    @keyframes spark-fly{
      0%{transform:translate(0,0) scale(1.2);opacity:1;}
      100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;}
    }

    /* Overlay */
    .overlay{
      position:fixed;inset:0;z-index:100;
      display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,0,.75);opacity:0;pointer-events:none;transition:opacity .35s;
    }
    .overlay.show{opacity:1;pointer-events:all;}
    .ov-card{
      background:linear-gradient(135deg,rgba(15,5,40,.96),rgba(30,5,55,.96));
      border:1.5px solid rgba(255,255,255,.25);border-radius:30px;
      padding:32px 42px;text-align:center;
      box-shadow:0 30px 90px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.1);
      transform:scale(.82);transition:transform .4s cubic-bezier(.34,1.56,.64,1);
      max-width:90vw;position:relative;overflow:hidden;
    }
    .overlay.show .ov-card{transform:scale(1);}
    .ov-emoji{font-size:60px;margin-bottom:8px;display:block;}
    .ov-title{font-size:28px;font-weight:900;margin-bottom:4px;}
    .ov-word{
      font-size:44px;font-weight:900;color:var(--gold);letter-spacing:5px;margin:10px 0 6px;
      animation:word-pop .5s cubic-bezier(.34,1.56,.64,1) .2s both;
    }
    @keyframes word-pop{from{transform:scale(.15);opacity:0;}to{transform:scale(1);opacity:1;}}
    .ov-streak{font-size:18px;font-weight:900;color:var(--gold);margin-bottom:4px;}
    .ov-sub{color:var(--muted);font-size:14px;margin-bottom:20px;}
    .ov-buttons{display:flex;gap:10px;justify-content:center;}

    /* Orbital rings on win card */
    .ov-ring{
      position:absolute;border-radius:50%;border:2px solid rgba(251,191,36,.3);
      animation:ov-orbit linear infinite;pointer-events:none;
    }
    @keyframes ov-orbit{from{transform:translate(-50%,-50%) rotate(0deg);}to{transform:translate(-50%,-50%) rotate(360deg);}}
  </style>
</head>
<body>
<div id="confetti"></div>
<div id="starshower"></div>

<div class="app">
  <header>
    <div class="title-area">
      <span class="badge">✨</span>
      <div>
        <h1>Word Magic</h1>
        <div class="sub" id="word-pool-label">Easy mode · Guess the letters!</div>
      </div>
    </div>
    <div class="header-right">
      <div class="level-toggle">
        <button class="lvl-btn active" id="btn-easy" onclick="setDifficulty('easy')">⭐ Easy</button>
        <button class="lvl-btn" id="btn-hard" onclick="setDifficulty('hard')">🌟 Hard</button>
      </div>
      <div class="streak-pill" id="streak-pill">
        <span class="streak-fire">🔥</span> <span class="streak-num" id="streak-num">0</span>
      </div>
      <div class="wrong-pill">Wrong: <span class="count" id="wrong-count">0</span>/6</div>
      <button class="primary" onclick="newGame()">New ✨</button>
    </div>
  </header>

  <div class="game-area">
    <div class="picture-panel">
      <div class="picture-wrap">
        <svg id="game-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="picture-hint" id="picture-hint">
          <span class="hint-emoji" id="hint-emoji">🎨</span>
          <span class="hint-text">Guess wrong to reveal<br>a hidden picture!</span>
        </div>
      </div>
    </div>
    <div class="controls-panel">
      <div class="word-area">
        <div class="word-display" id="word-display"></div>
        <div class="wrong-row" id="wrong-row">
          <span class="wrong-label" id="wrong-label" style="display:none">Tried:</span>
        </div>
      </div>
      <div class="keyboard" id="keyboard"></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="ov-card" id="ov-card">
    <span class="ov-emoji" id="ov-emoji">🎉</span>
    <div class="ov-title" id="ov-title">You got it!</div>
    <div class="ov-word" id="ov-word">APPLE</div>
    <div class="ov-streak" id="ov-streak" style="display:none"></div>
    <div class="ov-sub" id="ov-sub">Amazing spelling! ⭐</div>
    <div class="ov-buttons">
      <button class="primary" onclick="newGame()">Play Again ✨</button>
    </div>
  </div>
</div>

// ============================================================
// SOUND ENGINE  (Web Audio API — no files needed)
// ============================================================
let audioCtx = null;
function getCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function tone(freq, type, startT, dur, vol=0.3){
  const c = getCtx();
  const o = c.createOscillator();
  const g = c.createGain();
  o.connect(g); g.connect(c.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0, c.currentTime + startT);
  g.gain.linearRampToValueAtTime(vol, c.currentTime + startT + 0.02);
  g.gain.linearRampToValueAtTime(0, c.currentTime + startT + dur);
  o.start(c.currentTime + startT);
  o.stop(c.currentTime + startT + dur + 0.05);
}
function sfxCorrect(){
  [[523,.0,'sine'],[659,.1,'sine'],[784,.2,'sine']].forEach(([f,t,tp])=>tone(f,tp,t,.28,.28));
}
function sfxWrong(){
  tone(220,'sawtooth',0,.12,.18);
  tone(180,'sawtooth',0.08,.15,.15);
}
function sfxWin(){
  [[523,0],[659,.12],[784,.24],[1047,.36],[1319,.5]].forEach(([f,t])=>tone(f,'sine',t,.5,.35));
}
function sfxLose(){
  [[392,0],[349,.2],[294,.4],[220,.62]].forEach(([f,t])=>tone(f,'sine',t,.45,.22));
}
function sfxStreak(){
  [523,659,784,1047,1319,1568].forEach((f,i)=>tone(f,'sine',i*.09,.4,.3));
}
function sfxKeyTap(){
  tone(880,'sine',0,.06,.08);
}

// ============================================================
// APP ICON (generated via canvas, injected as data URL)
// ============================================================
function makeIcon(){
  const c = document.createElement('canvas');
  c.width=192; c.height=192;
  const ctx = c.getContext('2d');
  // Background
  const grd = ctx.createRadialGradient(96,96,10,96,96,96);
  grd.addColorStop(0,'#1a0835'); grd.addColorStop(1,'#0b1020');
  ctx.fillStyle=grd; ctx.beginPath();
  ctx.roundRect(0,0,192,192,36); ctx.fill();
  // Star
  ctx.font='bold 110px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('✨',96,96);
  const url = c.toDataURL('image/png');
  $('apple-icon').href = url;
  // Manifest blob
  const manifest = {
    name:'Word Magic',short_name:'Word Magic',
    start_url:'./',display:'standalone',
    background_color:'#0b1020',theme_color:'#7c3aed',
    icons:[{src:url,sizes:'192x192',type:'image/png'}]
  };
  const blob = new Blob([JSON.stringify(manifest)],{type:'application/json'});
  $('manifest-link').href = URL.createObjectURL(blob);
}

// ============================================================
// INIT
// ============================================================
window.onload = () => {
  makeIcon();
  buildBgSparkles();
  buildKeyboard();
  setDifficulty(difficulty, false);
};

function buildBgSparkles(){
  for(let i=0;i<18;i++){
    const s=document.createElement('div');
    s.className='bg-sparkle';
    s.style.left=Math.random()*100+'vw';
    s.style.animationDuration=(5+Math.random()*8)+'s';
    s.style.animationDelay=(Math.random()*10)+'s';
    const sz=(3+Math.random()*5)+'px';
    s.style.width=s.style.height=sz;
    document.body.appendChild(s);
  }
}

function buildKeyboard(){
  const kb=$('keyboard'); kb.innerHTML='';
  KEYBOARD.forEach(row=>{
    const rowEl=document.createElement('div'); rowEl.className='key-row';
    row.forEach(letter=>{
      const btn=document.createElement('button'); btn.className='key';
      btn.textContent=letter; btn.dataset.letter=letter;
      btn.onclick=()=>handleGuess(letter);
      rowEl.appendChild(btn);
    });
    kb.appendChild(rowEl);
  });
}

// ============================================================
// DIFFICULTY TOGGLE
// ============================================================
function setDifficulty(diff, skipNewGame=false){
  difficulty = diff;
  localStorage.setItem('wm_diff', diff);
  $('btn-easy').classList.toggle('active', diff==='easy');
  $('btn-hard').classList.toggle('active', diff==='hard');
  $('word-pool-label').textContent = diff==='easy' ? 'Easy mode · Guess the letters!' : 'Hard mode · Longer words!';
  if(!skipNewGame) newGame();
}

// ============================================================
// GAME LOGIC
// ============================================================
function newGame(){
  const pool = difficulty==='easy' ? EASY_WORDS : HARD_WORDS;
  let pick;
  do { pick = pool[Math.floor(Math.random()*pool.length)]; }
  while(currentWord && pick.word===currentWord.word);
  currentWord = pick;

  guessedLetters = new Set();
  wrongGuesses = 0;
  gameOver = false;

  $('overlay').classList.remove('show');
  $('game-svg').innerHTML='';
  $('picture-hint').classList.remove('hidden');
  $('hint-emoji').textContent='?';
  $('wrong-count').textContent='0';
  buildWordDisplay();
  $('wrong-row').innerHTML='<span class="wrong-label" id="wrong-label" style="display:none">Tried: </span>';
  document.querySelectorAll('.key').forEach(k=>k.classList.remove('used-correct','used-wrong'));
  renderStreak();
}

function buildWordDisplay(){
  const wd=$('word-display'); wd.innerHTML='';
  currentWord.word.split('').forEach(letter=>{
    const slot=document.createElement('div'); slot.className='letter-slot'; slot.dataset.letter=letter;
    const span=document.createElement('span'); span.className='ltr'; span.textContent=letter;
    slot.appendChild(span); wd.appendChild(slot);
  });
}

function renderStreak(){
  $('streak-num').textContent=streak;
  const pill=$('streak-pill');
  if(streak>=10) pill.style.background='rgba(251,191,36,.25)';
  else if(streak>=5) pill.style.background='rgba(236,72,153,.18)';
  else pill.style.background='rgba(0,0,0,.2)';
}

// ============================================================
// GUESS HANDLING
// ============================================================
function handleGuess(letter){
  if(gameOver) return;
  if(guessedLetters.has(letter)) return;
  guessedLetters.add(letter);
  sfxKeyTap();

  const key=document.querySelector(`.key[data-letter="${letter}"]`);
  const wordContains=currentWord.word.includes(letter);

  if(wordContains){
    key.classList.add('used-correct');
    revealLetters(letter);
    sfxCorrect();
    checkWin();
  } else {
    key.classList.add('used-wrong');
    addWrongLetter(letter);
    sfxWrong();
    wrongGuesses++;
    $('wrong-count').textContent=wrongGuesses;
    revealPicturePart(wrongGuesses-1);
    if(wrongGuesses>=MAX_WRONG){ setTimeout(showLose,700); gameOver=true; }
  }
}

function revealLetters(letter){
  document.querySelectorAll('.letter-slot').forEach(slot=>{
    if(slot.dataset.letter===letter){
      const span=slot.querySelector('.ltr');
      if(!span.classList.contains('show')){
        span.classList.add('show');
        setTimeout(()=>{
          const r=slot.getBoundingClientRect();
          sparkleBurst(r.left+r.width/2, r.top+r.height/2);
        },50);
      }
    }
  });
}

function checkWin(){
  const all=new Set(currentWord.word.split(''));
  if([...all].every(l=>guessedLetters.has(l))){
    gameOver=true;
    setTimeout(showWin,500);
  }
}

function addWrongLetter(letter){
  const row=$('wrong-row'); const lbl=$('wrong-label');
  if(lbl) lbl.style.display='inline';
  const span=document.createElement('span'); span.className='wrong-ltr'; span.textContent=letter;
  row.appendChild(span);
}

function revealPicturePart(idx){
  const svg=$('game-svg');
  $('picture-hint').classList.add('hidden');
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.className='svg-part'; g.innerHTML=currentWord.parts[idx];
  svg.appendChild(g);
  requestAnimationFrame(()=>requestAnimationFrame(()=>g.classList.add('show')));
}

// ============================================================
// WIN / LOSE
// ============================================================
function showWin(){
  // Update streak
  streak++;
  localStorage.setItem('wm_streak', streak);
  renderStreak();

  // Bump animation
  const pill=$('streak-pill');
  pill.classList.remove('bump');
  void pill.offsetWidth;
  pill.classList.add('bump');

  // Choose celebration
  celebrate();
  sfxWin();

  // Overlay content
  const isStreakMilestone = streak===3||streak===5||streak===10||streak===15||streak===20;
  $('ov-emoji').textContent = streak>=10 ? '🏆' : '🎉';
  $('ov-title').textContent = wrongGuesses===0 ? 'PERFECT! 🌟' : 'You got it!';
  $('ov-word').textContent = currentWord.word;

  const ovStreak=$('ov-streak');
  if(streak>1){
    ovStreak.style.display='block';
    ovStreak.textContent = isStreakMilestone
      ? `🔥 ${streak} in a row! Amazing!!`
      : `🔥 Streak: ${streak}`;
    if(isStreakMilestone) sfxStreak();
  } else { ovStreak.style.display='none'; }

  const msgs=['Amazing spelling! ⭐','Super smart! ✨','You are a spelling star! 🌟','Brilliant! 🎊','Fantastic job! 🎉'];
  $('ov-sub').textContent = msgs[Math.floor(Math.random()*msgs.length)];

  $('overlay').classList.add('show');
}

function showLose(){
  // Reveal remaining parts
  for(let i=wrongGuesses;i<currentWord.parts.length;i++) revealPicturePart(i);

  // Reset streak
  if(streak>0){
    streak=0;
    localStorage.setItem('wm_streak','0');
    renderStreak();
  }

  sfxLose();
  setTimeout(()=>{
    $('ov-emoji').textContent='🌟';
    $('ov-title').textContent='Better luck next time!';
    $('ov-word').textContent='';
    $('ov-streak').style.display='none';
    const msgs=["Don't worry, try the next one! 💪","You'll get it next time! 🌈","Keep going, you're great! ⭐","Practice makes perfect! 🎯"];
    $('ov-sub').textContent=msgs[Math.floor(Math.random()*msgs.length)];
    $('overlay').classList.add('show');
  },800);
}

// ============================================================
// CELEBRATIONS (3 types, rotating)
// ============================================================
function celebrate(){
  const type = celebType % 3;
  celebType++;
  if(type===0) doConfetti();
  else if(type===1) doStarShower();
  else doFireworks();
  sparkleBurst(window.innerWidth/2, window.innerHeight/2, 22, true);
}

// --- Confetti ---
function doConfetti(n=60){
  const el=$('confetti');
  const colors=['rgba(236,72,153,.95)','rgba(124,58,237,.95)','rgba(251,191,36,.95)',
    'rgba(255,255,255,.95)','rgba(52,211,153,.95)','rgba(96,165,250,.95)'];
  for(let i=0;i<n;i++){
    const p=document.createElement('i');
    p.style.left=Math.random()*100+'vw';
    p.style.top=(-5-Math.random()*15)+'vh';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration=(1.0+Math.random()*1.0)+'s';
    p.style.animationDelay=Math.random()*.5+'s';
    p.style.transform=`rotate(${Math.random()*180}deg)`;
    p.style.width=(8+Math.random()*7)+'px';
    p.style.height=(10+Math.random()*9)+'px';
    el.appendChild(p);
  }
  setTimeout(()=>el.innerHTML='',2600);
}

// --- Star Shower ---
function doStarShower(){
  const el=$('starshower');
  const stars=['⭐','🌟','✨','💫','⚡'];
  for(let i=0;i<28;i++){
    const s=document.createElement('span');
    s.textContent=stars[Math.floor(Math.random()*stars.length)];
    s.style.left=Math.random()*100+'vw';
    s.style.top='-40px';
    s.style.animationDuration=(1.2+Math.random()*.8)+'s';
    s.style.animationDelay=(Math.random()*.9)+'s';
    s.style.fontSize=(16+Math.random()*16)+'px';
    el.appendChild(s);
  }
  setTimeout(()=>el.innerHTML='',2500);
}

// --- Firework Rings ---
function doFireworks(){
  const ringColors=['#ef4444','#f97316','#fbbf24','#4ade80','#60a5fa','#a78bfa','#f472b6'];
  const points=[
    [window.innerWidth*0.3,window.innerHeight*0.3],
    [window.innerWidth*0.7,window.innerHeight*0.3],
    [window.innerWidth*0.5,window.innerHeight*0.5],
    [window.innerWidth*0.2,window.innerHeight*0.6],
    [window.innerWidth*0.8,window.innerHeight*0.6],
  ];
  points.forEach(([x,y],i)=>{
    setTimeout(()=>{
      const c=ringColors[Math.floor(Math.random()*ringColors.length)];
      for(let r=0;r<3;r++){
        setTimeout(()=>{
          const el=document.createElement('div');
          el.className='fw-ring';
          el.style.left=x+'px'; el.style.top=y+'px';
          el.style.borderColor=c;
          el.style.animationDuration=(.6+r*.15)+'s';
          el.style.animationDelay='0s';
          document.body.appendChild(el);
          setTimeout(()=>el.remove(),900);
        },r*120);
      }
      sparkleBurst(x,y,8);
    },i*160);
  });
}

// ============================================================
// SPARKLE BURST
// ============================================================
const SPARK_COLORS=['#fbbf24','#f472b6','#818cf8','#34d399','#60a5fa','#f97316','#ffffff'];

function sparkleBurst(cx,cy,count=10,big=false){
  for(let i=0;i<count;i++){
    const s=document.createElement('div'); s.className='spark';
    const angle=(i/count)*Math.PI*2+Math.random()*.5;
    const dist=(big?80:38)+Math.random()*(big?70:28);
    s.style.setProperty('--dx',Math.cos(angle)*dist+'px');
    s.style.setProperty('--dy',Math.sin(angle)*dist+'px');
    s.style.left=(cx-4)+'px'; s.style.top=(cy-4)+'px';
    s.style.background=SPARK_COLORS[Math.floor(Math.random()*SPARK_COLORS.length)];
    const sz=big?(6+Math.random()*8):(4+Math.random()*6);
    s.style.width=s.style.height=sz+'px';
    s.style.animationDuration=(.45+Math.random()*.4)+'s';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),900);
  }
}
