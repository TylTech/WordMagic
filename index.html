<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Word Magic ✨</title>
  <style>
    :root {
      --bg1: #0b1020; --bg2: #1a0835;
      --purple: #7c3aed; --pink: #ec4899; --gold: #fbbf24; --green: #34d399;
      --text: #f8fafc; --muted: rgba(248,250,252,.75);
      --card: rgba(255,255,255,.10); --card2: rgba(255,255,255,.13);
      --border: rgba(255,255,255,.15); --shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: ui-rounded, -apple-system, "SF Pro Display", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 700px at 15% 10%, rgba(236,72,153,.20), transparent 60%),
        radial-gradient(900px 600px at 85% 25%, rgba(124,58,237,.26), transparent 60%),
        radial-gradient(800px 500px at 50% 90%, rgba(251,191,36,.18), transparent 60%),
        linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 100%);
      touch-action: manipulation; user-select: none;
    }

    /* Floating background sparkles */
    .bg-sparkle {
      position: fixed; pointer-events: none; z-index: 0;
      width: 5px; height: 5px; border-radius: 50%;
      background: white; opacity: 0;
      animation: sparkle-float linear infinite;
      filter: drop-shadow(0 0 5px rgba(255,255,255,.7));
    }
    @keyframes sparkle-float {
      0%   { opacity: 0; transform: translateY(105vh) translateX(0) scale(1); }
      10%  { opacity: 0.45; }
      90%  { opacity: 0.35; }
      100% { opacity: 0; transform: translateY(-10vh) translateX(60px) scale(.5); }
    }

    /* Confetti */
    #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 200; overflow: hidden; }
    #confetti i {
      position: absolute; display: block; width: 10px; height: 13px; border-radius: 3px;
      animation: confetti-fall 1.5s ease-in forwards;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(-5vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(540deg); opacity: .2; }
    }

    /* === LAYOUT === */
    .app {
      position: relative; z-index: 1;
      height: 100%; padding: 10px;
      display: flex; flex-direction: column; gap: 8px;
      max-width: 1100px; margin: 0 auto;
    }

    /* === HEADER === */
    header {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 10px 16px;
      background: linear-gradient(90deg, rgba(124,58,237,.25), rgba(236,72,153,.18), rgba(251,191,36,.12));
      border: 1px solid var(--border); border-radius: 20px;
    }
    .title-area { display: flex; align-items: center; gap: 10px; }
    .badge { font-size: 26px; }
    h1 { font-size: clamp(16px, 2.8vw, 24px); font-weight: 900; letter-spacing: .2px; }
    .sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .header-right { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .wrong-pill {
      padding: 6px 13px; border-radius: 999px;
      background: rgba(0,0,0,.2); border: 1px solid var(--border);
      font-size: 13px; font-weight: 800; white-space: nowrap;
    }
    .wrong-pill .count { color: var(--pink); }

    button {
      padding: 9px 15px; border-radius: 14px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.06));
      color: var(--text); font-size: 14px; font-weight: 800;
      cursor: pointer; transition: transform .08s, filter .08s;
      touch-action: manipulation;
    }
    button:active { transform: scale(.96); filter: brightness(1.15); }
    button.primary {
      background: linear-gradient(135deg, rgba(124,58,237,.6), rgba(236,72,153,.5));
      border-color: rgba(255,255,255,.25);
    }

    /* === GAME AREA (picture + controls) === */
    .game-area {
      flex: 1 1 0; min-height: 0;
      display: flex; flex-direction: column; gap: 8px;
    }
    @media (min-width: 680px) and (orientation: landscape) {
      .game-area { flex-direction: row; }
    }

    /* === PICTURE PANEL === */
    .picture-panel {
      flex: 1 1 0; min-height: 0; min-width: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .picture-wrap {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      border: 1px solid var(--border); border-radius: 24px;
      position: relative; overflow: hidden;
    }
    .picture-wrap svg {
      width: min(100%, 340px); height: min(100%, 340px);
      display: block;
    }

    /* Hint text when no wrong guesses yet */
    .picture-hint {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      text-align: center; pointer-events: none;
      transition: opacity .4s;
    }
    .picture-hint .hint-emoji { font-size: 52px; opacity: .25; display: block; margin-bottom: 6px; }
    .picture-hint .hint-text { font-size: 12px; color: var(--muted); opacity: .5; }
    .picture-hint.hidden { opacity: 0; }

    /* SVG part reveal animation */
    .svg-part { transition: opacity .6s ease; opacity: 0; }
    .svg-part.show { opacity: 1; }

    /* === RIGHT PANEL (word + keyboard) === */
    .controls-panel {
      flex-shrink: 0;
      display: flex; flex-direction: column; gap: 8px;
    }
    @media (min-width: 680px) and (orientation: landscape) {
      .controls-panel { flex: 0 0 380px; }
    }

    /* === WORD DISPLAY === */
    .word-area {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 14px 16px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .word-display { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; }
    .letter-slot {
      width: 42px; height: 48px;
      border-bottom: 3px solid rgba(255,255,255,.35);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .letter-slot .ltr {
      font-size: 26px; font-weight: 900; color: var(--gold);
      opacity: 0; transform: scale(0) rotate(-15deg);
      transition: opacity .25s, transform .35s cubic-bezier(.34,1.56,.64,1);
      display: inline-block;
    }
    .letter-slot .ltr.show { opacity: 1; transform: scale(1) rotate(0deg); }

    .wrong-row {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: center;
      min-height: 22px;
    }
    .wrong-label { font-size: 11px; color: var(--muted); }
    .wrong-ltr {
      font-size: 14px; font-weight: 900; color: rgba(248,72,153,.75);
      text-decoration: line-through; display: inline-block;
    }

    /* === KEYBOARD === */
    .keyboard {
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      border: 1px solid var(--border); border-radius: 20px;
      padding: 10px 8px; flex-shrink: 0;
    }
    .key-row { display: flex; gap: 5px; justify-content: center; margin-bottom: 5px; }
    .key-row:last-child { margin-bottom: 0; }
    .key {
      width: 54px; height: 50px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,.22);
      background: linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.08));
      color: var(--text); font-size: 17px; font-weight: 900;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform .08s, opacity .2s, background .15s;
      touch-action: manipulation; flex-shrink: 0;
    }
    .key:active:not(.used) { transform: scale(.90); }
    .key.used-correct {
      background: linear-gradient(135deg, rgba(52,211,153,.35), rgba(52,211,153,.2));
      border-color: rgba(52,211,153,.45); opacity: .4; cursor: default;
    }
    .key.used-wrong {
      background: rgba(0,0,0,.15); border-color: rgba(255,255,255,.07);
      opacity: .25; cursor: default;
    }

    /* Resize keys on smaller screens */
    @media (max-width: 420px) {
      .key { width: 44px; height: 44px; font-size: 15px; }
      .key-row { gap: 4px; }
    }
    @media (max-width: 360px) {
      .key { width: 38px; height: 40px; font-size: 13px; border-radius: 9px; }
      .key-row { gap: 3px; }
    }

    /* === SPARKLE BURST (correct guess) === */
    .spark {
      position: fixed; pointer-events: none; z-index: 150;
      width: 8px; height: 8px; border-radius: 50%;
      animation: spark-fly .7s ease-out forwards;
    }
    @keyframes spark-fly {
      0%   { transform: translate(0,0) scale(1.2); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    /* === OVERLAY (win/lose) === */
    .overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.72);
      opacity: 0; pointer-events: none;
      transition: opacity .35s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .ov-card {
      background: linear-gradient(135deg, rgba(15,5,40,.95), rgba(30,5,55,.95));
      border: 1.5px solid rgba(255,255,255,.25); border-radius: 32px;
      padding: 36px 44px; text-align: center;
      box-shadow: 0 30px 90px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.1);
      transform: scale(.82);
      transition: transform .4s cubic-bezier(.34,1.56,.64,1);
      max-width: 90vw;
    }
    .overlay.show .ov-card { transform: scale(1); }
    .ov-emoji { font-size: 64px; margin-bottom: 10px; display: block; }
    .ov-title { font-size: 32px; font-weight: 900; margin-bottom: 6px; }
    .ov-word {
      font-size: 48px; font-weight: 900; color: var(--gold);
      letter-spacing: 5px; margin: 12px 0 8px;
      animation: word-pop .5s cubic-bezier(.34,1.56,.64,1) .25s both;
    }
    @keyframes word-pop { from { transform: scale(.2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .ov-sub { color: var(--muted); font-size: 15px; margin-bottom: 22px; }
    .ov-buttons { display: flex; gap: 10px; justify-content: center; }
  </style>
</head>
<body>

<div id="confetti"></div>

<div class="app">
  <header>
    <div class="title-area">
      <span class="badge">✨</span>
      <div>
        <h1>Word Magic</h1>
        <div class="sub">Guess the letters!</div>
      </div>
    </div>
    <div class="header-right">
      <div class="wrong-pill">Wrong: <span class="count" id="wrong-count">0</span>/6</div>
      <button class="primary" onclick="newGame()">New Word 🔀</button>
    </div>
  </header>

  <div class="game-area">
    <!-- Picture -->
    <div class="picture-panel">
      <div class="picture-wrap">
        <svg id="game-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="picture-hint" id="picture-hint">
          <span class="hint-emoji" id="hint-emoji">🎨</span>
          <span class="hint-text">Guess wrong to reveal<br>a hidden picture!</span>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls-panel">
      <div class="word-area">
        <div class="word-display" id="word-display"></div>
        <div class="wrong-row" id="wrong-row">
          <span class="wrong-label" id="wrong-label" style="display:none">Tried:</span>
        </div>
      </div>
      <div class="keyboard" id="keyboard"></div>
    </div>
  </div>
</div>

<!-- Win/Lose Overlay -->
<div class="overlay" id="overlay">
  <div class="ov-card">
    <span class="ov-emoji" id="ov-emoji">🎉</span>
    <div class="ov-title" id="ov-title">You got it!</div>
    <div class="ov-word" id="ov-word">APPLE</div>
    <div class="ov-sub" id="ov-sub">Amazing spelling! ⭐</div>
    <div class="ov-buttons">
      <button class="primary" onclick="newGame()">Play Again ✨</button>
    </div>
  </div>
</div>

// ============================
// KEYBOARD LAYOUT (QWERTY)
// ============================
const KEYBOARD = [
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['Z','X','C','V','B','N','M']
];

// ============================
// GAME STATE
// ============================
let currentWord = null;
let guessedLetters = new Set();
let wrongGuesses = 0;
let gameOver = false;

const MAX_WRONG = 6;

// ============================
// DOM HELPERS
// ============================
const $ = id => document.getElementById(id);

// ============================
// INIT
// ============================
window.onload = () => {
  buildBgSparkles();
  buildKeyboard();
  newGame();
};

function buildBgSparkles() {
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('div');
    s.className = 'bg-sparkle';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.animationDuration = (5 + Math.random() * 8) + 's';
    s.style.animationDelay = (Math.random() * 10) + 's';
    s.style.width = s.style.height = (3 + Math.random() * 5) + 'px';
    document.body.appendChild(s);
  }
}

function buildKeyboard() {
  const kb = $('keyboard');
  kb.innerHTML = '';
  KEYBOARD.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.className = 'key-row';
    row.forEach(letter => {
      const btn = document.createElement('button');
      btn.className = 'key';
      btn.textContent = letter;
      btn.dataset.letter = letter;
      btn.onclick = () => handleGuess(letter);
      rowEl.appendChild(btn);
    });
    kb.appendChild(rowEl);
  });
}

function newGame() {
  // Pick a random word (avoid same word twice in a row)
  let pick;
  do { pick = WORDS[Math.floor(Math.random() * WORDS.length)]; }
  while (currentWord && pick.word === currentWord.word);
  currentWord = pick;

  guessedLetters = new Set();
  wrongGuesses = 0;
  gameOver = false;

  // Hide overlay
  $('overlay').classList.remove('show');

  // Reset SVG
  $('game-svg').innerHTML = '';
  $('picture-hint').classList.remove('hidden');
  $('hint-emoji').textContent = '?';

  // Reset wrong count
  $('wrong-count').textContent = '0';

  // Build word display
  buildWordDisplay();

  // Reset wrong row
  $('wrong-row').innerHTML = '';
  $('wrong-row').innerHTML = '<span class="wrong-label" id="wrong-label" style="display:none">Tried: </span>';

  // Re-enable all keys
  document.querySelectorAll('.key').forEach(k => {
    k.classList.remove('used-correct', 'used-wrong');
  });
}

function buildWordDisplay() {
  const wd = $('word-display');
  wd.innerHTML = '';
  currentWord.word.split('').forEach(letter => {
    const slot = document.createElement('div');
    slot.className = 'letter-slot';
    slot.dataset.letter = letter;
    const span = document.createElement('span');
    span.className = 'ltr';
    span.textContent = letter;
    slot.appendChild(span);
    wd.appendChild(slot);
  });
}

// ============================
// GUESS HANDLING
// ============================
function handleGuess(letter) {
  if (gameOver) return;
  if (guessedLetters.has(letter)) return;
  guessedLetters.add(letter);

  const key = document.querySelector(`.key[data-letter="${letter}"]`);
  const wordContains = currentWord.word.includes(letter);

  if (wordContains) {
    // Correct! Reveal letter(s) in word + sparkle
    key.classList.add('used-correct');
    revealLetters(letter);
    checkWin();
  } else {
    // Wrong! Reveal next picture part
    key.classList.add('used-wrong');
    addWrongLetter(letter);
    wrongGuesses++;
    $('wrong-count').textContent = wrongGuesses;
    revealPicturePart(wrongGuesses - 1);

    if (wrongGuesses >= MAX_WRONG) {
      setTimeout(showLose, 700);
      gameOver = true;
    }
  }
}

function revealLetters(letter) {
  let anyRevealed = false;
  document.querySelectorAll('.letter-slot').forEach(slot => {
    if (slot.dataset.letter === letter) {
      const span = slot.querySelector('.ltr');
      if (!span.classList.contains('show')) {
        span.classList.add('show');
        anyRevealed = true;
        // sparkle burst at this slot's position
        setTimeout(() => {
          const rect = slot.getBoundingClientRect();
          sparkleBurst(rect.left + rect.width / 2, rect.top + rect.height / 2);
        }, 50);
      }
    }
  });
}

function checkWin() {
  const allLetters = new Set(currentWord.word.split(''));
  const guessedAll = [...allLetters].every(l => guessedLetters.has(l));
  if (guessedAll) {
    gameOver = true;
    setTimeout(showWin, 500);
  }
}

function addWrongLetter(letter) {
  const row = $('wrong-row');
  const lbl = $('wrong-label');
  if (lbl) lbl.style.display = 'inline';
  const span = document.createElement('span');
  span.className = 'wrong-ltr';
  span.textContent = letter;
  row.appendChild(span);
}

// ============================
// PICTURE REVEAL
// ============================
function revealPicturePart(partIndex) {
  const svg = $('game-svg');
  $('picture-hint').classList.add('hidden');

  // Create a group for this part
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.className = 'svg-part';
  g.innerHTML = currentWord.parts[partIndex];

  // Force reflow before adding 'show' for transition
  svg.appendChild(g);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { g.classList.add('show'); });
  });
}

// ============================
// WIN / LOSE
// ============================
function showWin() {
  $('ov-emoji').textContent = '🎉';
  $('ov-title').textContent = 'You got it!';
  $('ov-word').textContent = currentWord.word;
  $('ov-sub').textContent = 'Amazing spelling! ⭐ ✨ ⭐';
  $('overlay').classList.add('show');
  burstConfetti(55);
  // Big sparkle in centre
  sparkleBurst(window.innerWidth / 2, window.innerHeight / 2, 18, true);
}

function showLose() {
  // Reveal all remaining parts
  const partsRevealed = wrongGuesses;
  for (let i = partsRevealed; i < currentWord.parts.length; i++) {
    revealPicturePart(i);
  }
  setTimeout(() => {
    $('ov-emoji').textContent = '🌟';
    $('ov-title').textContent = 'The word was...';
    $('ov-word').textContent = currentWord.word;
    $('ov-sub').textContent = "Don't worry, you'll get the next one! 💪";
    $('overlay').classList.add('show');
  }, 800);
}

// ============================
// SPARKLE BURST
// ============================
const SPARK_COLORS = [
  '#fbbf24','#f472b6','#818cf8','#34d399','#60a5fa','#f97316','#ffffff'
];

function sparkleBurst(cx, cy, count = 10, big = false) {
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    const angle = (i / count) * Math.PI * 2 + Math.random() * .5;
    const dist = (big ? 80 : 40) + Math.random() * (big ? 70 : 30);
    s.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    s.style.left = (cx - 4) + 'px';
    s.style.top  = (cy - 4) + 'px';
    s.style.background = SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)];
    const size = big ? (6 + Math.random() * 8) : (4 + Math.random() * 6);
    s.style.width = s.style.height = size + 'px';
    s.style.animationDuration = (.5 + Math.random() * .4) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 900);
  }
}

// ============================
// CONFETTI
// ============================
function burstConfetti(n) {
  const el = $('confetti');
  const colors = [
    'rgba(236,72,153,.95)', 'rgba(124,58,237,.95)',
    'rgba(251,191,36,.95)', 'rgba(255,255,255,.95)',
    'rgba(52,211,153,.95)', 'rgba(96,165,250,.95)'
  ];
  for (let i = 0; i < n; i++) {
    const p = document.createElement('i');
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = (-5 - Math.random() * 15) + 'vh';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDuration = (1.0 + Math.random() * 1.0) + 's';
    p.style.animationDelay = Math.random() * .5 + 's';
    p.style.transform = `rotate(${Math.random() * 180}deg)`;
    p.style.width = (8 + Math.random() * 6) + 'px';
    p.style.height = (10 + Math.random() * 8) + 'px';
    el.appendChild(p);
  }
  setTimeout(() => el.innerHTML = '', 2500);
}
</script>
